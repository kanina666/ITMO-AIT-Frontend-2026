<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MLOps Flow — sign in to manage your ML pipelines.">
    <title>Login - MLOps Flow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-wrapper">

    <a href="#loginForm" class="skip-link">Skip to login form</a>

    <main>
        <div class="card auth-card p-4">
            <div class="text-center mb-4">
                <h1 class="fw-bold text-primary fs-3">
                    <i class="fas fa-brain me-2" aria-hidden="true"></i>MLOps Flow
                </h1>
                <p class="text-muted">Sign in to manage your pipelines</p>
            </div>

            <form id="loginForm" class="needs-validation" novalidate aria-label="Login form">
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        name="email"
                        placeholder="name@example.com"
                        required
                        autocomplete="email"
                        aria-required="true"
                        aria-describedby="emailFeedback"
                    >
                    <div id="emailFeedback" class="invalid-feedback" role="alert">
                        Please enter a valid email.
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                        aria-required="true"
                        aria-describedby="passwordFeedback"
                    >
                    <div id="passwordFeedback" class="invalid-feedback" role="alert">
                        Password is required.
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="small text-muted">
                    Don't have an account?
                    <a href="register.html" class="text-decoration-none fw-bold">Register</a>
                </p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
